services:
  - type: web
    name: sonic-lab-bot
    runtime: node
    buildCommand: npm install
    startCommand: node src/index.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: FB_PAGE_ACCESS_TOKEN
        sync: false
      - key: FB_VERIFY_TOKEN
        value: sonic_lab_verify_2026
      - key: FB_APP_SECRET
        sync: false
